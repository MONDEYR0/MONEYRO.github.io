    <title>MONDEYRO | Models</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .models-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .models-title {
            text-align: center;
            font-size: 24px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 60px;
        }
        .models-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .models-card {
            background: #fff;
            overflow: hidden;
        }
        .models-card img {
            width: 100%;
            height: 550px;
            object-fit: cover;
            display: block;
            border: 1px solid #f5f5f5;
            transition: opacity 0.3s ease;
        }
        .models-card img:hover {
            opacity: 0.85;
        }
        @media (max-width: 900px) {
            .models-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .models-card img {
                height: 400px;
            }
        }
        @media (max-width: 600px) {
            .models-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .models-card img {
                height: 450px;
            }
        }
    </style>
</head>
